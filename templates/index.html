<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Prediction</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Titanic Survival Prediction</h2>

    <form action="/predict" method="post">

        <label>Pclass</label>
        <select name="Pclass">
            <option value="1">1st Class</option>
            <option value="2">2nd Class</option>
            <option value="3">3rd Class</option>
        </select>

        <label>Gender</label>
        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Age</label>
        <input type="number" step="1" name="Age" required>

        <label>Siblings/Spouses Aboard (SibSp)</label>
        <input type="number" name="SibSp" required>

        <label>Parents/Children Aboard (Parch)</label>
        <input type="number" name="Parch" required>

        <label>Fare</label>
        <input type="number" step="0.01" name="Fare" required>

        <label>Embarked</label>
        <select name="Embarked">
            <option value="S">Southampton</option>
            <option value="C">Cherbourg</option>
            <option value="Q">Queenstown</option>
        </select>

        <button type="submit">Predict Survival</button>

    </form>

</div>

</body>
</html>
